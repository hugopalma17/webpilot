name: Publish to npm

permissions:
  contents: read

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Publish unscoped h17-webpilot
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

      - name: Rename package to @h17/webpilot for scoped publish
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./package.json','utf8')); p.name='@h17/webpilot'; fs.writeFileSync('./package.json', JSON.stringify(p,null,2));"

      - name: Publish scoped @h17/webpilot
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

