name: Publish to npm

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

  publish-scoped-webpilot:
    needs: publish-root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Rename package to @h17/webpilot for scoped publish
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./package.json','utf8')); p.name='@h17/webpilot'; fs.writeFileSync('./package.json', JSON.stringify(p,null,2));"
      - run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

